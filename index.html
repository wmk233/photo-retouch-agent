<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Retouch Agent MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">PR</div>
          <div>
            <h1>Photo Retouch Agent</h1>
            <p>照片美化 Agent MVP</p>
          </div>
        </div>
        <div class="status-pill" id="globalStatus" aria-live="polite">
          <span class="status-dot idle"></span>
          <span>等待上传</span>
        </div>
      </header>

      <main class="workspace" aria-label="照片美化工作台">
        <section class="panel upload-panel" aria-labelledby="uploadTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Source</p>
              <h2 id="uploadTitle">原图</h2>
            </div>
            <span class="format-note">JPG / PNG / WebP · 10MB</span>
          </div>

          <div class="upload-actions">
            <input id="fileInput" class="sr-only" type="file" accept="image/jpeg,image/png,image/webp" />
            <button class="primary-action" id="uploadButton" type="button">选择照片</button>
            <button class="ghost-action" id="sampleButton" type="button">示例图</button>
          </div>

          <figure class="preview-frame source-frame">
            <img id="sourceImage" alt="原图预览" hidden />
            <div class="empty-state" id="sourceEmpty">
              <div class="empty-glyph" aria-hidden="true"></div>
              <span>未上传</span>
            </div>
          </figure>

          <dl class="meta-grid" id="photoMeta">
            <div>
              <dt>图片 ID</dt>
              <dd>--</dd>
            </div>
            <div>
              <dt>尺寸</dt>
              <dd>--</dd>
            </div>
            <div>
              <dt>大小</dt>
              <dd>--</dd>
            </div>
            <div>
              <dt>格式</dt>
              <dd>--</dd>
            </div>
          </dl>
        </section>

        <section class="panel agent-panel" aria-labelledby="agentTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Agent</p>
              <h2 id="agentTitle">分析与方案</h2>
            </div>
            <button class="small-action" id="analyzeButton" type="button" disabled>开始分析</button>
          </div>

          <div class="state-block" id="analysisEmpty">待分析</div>

          <div id="analysisContent" hidden>
            <div class="analysis-summary">
              <div>
                <span class="metric-label">场景</span>
                <strong id="sceneType">--</strong>
              </div>
              <div>
                <span class="metric-label">主体</span>
                <strong id="subjectSummary">--</strong>
              </div>
              <div>
                <span class="metric-label">风险</span>
                <strong id="riskSummary">--</strong>
              </div>
            </div>

            <div class="analysis-groups" id="analysisGroups"></div>
          </div>

          <div class="plans-header">
            <h3>一键方案</h3>
            <span id="planCount">0</span>
          </div>
          <div class="plan-list" id="planList"></div>
        </section>

        <section class="panel result-panel" aria-labelledby="resultTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Output</p>
              <h2 id="resultTitle">结果</h2>
            </div>
            <div class="result-actions">
              <button class="small-action" id="regenerateButton" type="button" disabled>重新生成</button>
              <button class="primary-action compact" id="downloadButton" type="button" disabled>下载</button>
            </div>
          </div>

          <div class="result-stage" id="resultStage">
            <div class="comparison" id="comparison" hidden>
              <img id="compareBefore" alt="对比原图" />
              <div class="after-layer" id="afterLayer">
                <img id="compareAfter" alt="美化结果" />
              </div>
              <div class="split-line" id="splitLine" aria-hidden="true"></div>
              <input
                id="compareSlider"
                class="compare-slider"
                type="range"
                min="0"
                max="100"
                value="55"
                aria-label="原图和结果对比"
              />
            </div>
            <div class="empty-state result-empty" id="resultEmpty">
              <div class="empty-glyph result" aria-hidden="true"></div>
              <span>暂无结果</span>
            </div>
            <div class="job-overlay" id="jobOverlay" hidden>
              <div class="spinner" aria-hidden="true"></div>
              <span id="jobText">生成中</span>
            </div>
          </div>

          <div class="execution-note" id="executionNote">--</div>
        </section>
      </main>

      <footer class="chat-dock" aria-label="二次修改">
        <div class="history-strip" id="historyStrip">
          <span class="history-item muted">等待任务</span>
        </div>
        <form class="refine-form" id="refineForm">
          <input
            id="instructionInput"
            type="text"
            autocomplete="off"
            placeholder="例如：再自然一点，肤色再亮一些，保持风格但裁成头像"
            disabled
          />
          <button class="primary-action" id="refineButton" type="submit" disabled>继续修改</button>
        </form>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
